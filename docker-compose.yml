# Docker Compose — development
# 操作は .cursor/skills/dev-docker/SKILL.md（scripts/up.sh 等）を正とする。
#
# Default: agrr-server + strangler-proxy (:3000 → Rust API/WS/auth)
# Tests: test-common（profile test）— R4 contract harness only (P8.5)

services:
  # Rust API / WebSocket / OAuth (default dev stack)
  agrr-server:
    build:
      context: .
      dockerfile: Dockerfile.agrr-server
    ports:
      - "8080:8080"
    volumes:
      - storage_dev_data:/app/storage
      - ./lib/core:/app/lib/core:ro
    environment:
      - AGRR_SQLITE_PATH=/app/storage/development.sqlite3
      - AGRR_CACHE_SQLITE_PATH=/app/storage/development_cache.sqlite3
      - AGRR_ENV=development
      - SKIP_CABLE_DB=true
      - USE_AGRR_DAEMON=true
      - AGRR_BIN_PATH=/usr/local/bin/agrr
      - WEATHER_DATA_SOURCE=nasa-power
      - FRONTEND_URL=http://localhost:4200,http://127.0.0.1:4200
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SCHEDULER_AUTH_TOKEN=${SCHEDULER_AUTH_TOKEN:-}
      - AGRR_BACKDOOR_TOKEN=${AGRR_BACKDOOR_TOKEN:-4d2522cd0f306acaca381256ea73cdb2288d12759a318b8b8988975b78ba2a32}
      - GCS_BUCKET_DEV=${GCS_BUCKET_DEV:-}
    entrypoint: ["bash", "/app/dev-docker-entrypoints/docker-entrypoint-dev-rust-stack.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/up"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  strangler-proxy:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./docker/nginx-strangler.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      agrr-server:
        condition: service_healthy

  # Test environment (R4 contract harness + agrr-migrate)
  # テスト実行方法:
  #   - 全テスト: docker compose run --rm test bundle exec rails test
  #   - システムテスト: docker compose run --rm test bundle exec rails test:system
  #   - 特定テスト: docker compose run --rm test bundle exec rails test test/models/farm_test.rb
  # 詳細は README.md および docs/TESTING_GUIDELINES.md を参照
  test:
    image: agrr-test:latest
    build:
      context: .
      dockerfile: Dockerfile.test
      network: host
      extra_hosts:
        - "host.docker.internal:host-gateway"
    entrypoint: ["bash", "/app/scripts/docker-entrypoint-test.sh"]
    volumes:
      - .:/app
      # vendor/bundleはコンテナ内のものを使用（Dockerfile.testでインストール済み）
      - /app/vendor/bundle
      # bundle_dataはマウントしない（Dockerfile.testでインストールされたgemを使用）
      # - bundle_data:/usr/local/bundle
      - bundle_cache:/usr/local/bundle/cache
    tmpfs:
      - /app/storage:mode=777  # テスト専用の一時ストレージ（開発環境と完全分離）
      - /app/tmp:mode=777
    environment:
      - RAILS_ENV=test
      - DATABASE_URL=sqlite3:storage/test.sqlite3
      - FRONTEND_URL=http://localhost:4200  # AuthTestController return_to 許可用
      - SELENIUM_HOST=selenium
      - SELENIUM_PORT=4444
      - AGRR_BIN_PATH=/app/lib/core/agrr  # 明示的にvolume-mountedバイナリを指定
      - WEATHER_DATA_SOURCE=nasa-power  # NASA POWER: Global coverage (1984-present)
      - USE_AGRR_DAEMON=false  # 通常のテストではdaemonを使用しない
      - SKIP_ASSET_BUILD=1  # P8.5: contract harness only
    command: bash -c "tail -f /dev/null"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    profiles:
      - test
    # depends_on:
    #   - selenium  # Seleniumは統合テストでのみ必要

  # Integration test environment (統合テスト専用 - デーモン起動)
  # テスト実行方法:
  #   - 全テスト: docker compose run --rm test bundle exec rails test
  #   - システムテスト: docker compose run --rm test bundle exec rails test:system
  #   - 特定テスト: docker compose run --rm test bundle exec rails test test/models/farm_test.rb
  # 詳細は README.md および docs/TESTING_GUIDELINES.md を参照
  test-integration:
    image: agrr-test-integration:latest
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      extra_hosts:
        - "host.docker.internal:host-gateway"
    entrypoint: ["bash", "/app/scripts/docker-entrypoint-test-integration.sh"]
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
      - bundle_cache:/usr/local/bundle/cache
    tmpfs:
      - /app/storage:mode=777  # テスト専用の一時ストレージ（開発環境と完全分離）
      - /app/tmp:mode=777
    environment:
      - RAILS_ENV=test
      - DATABASE_URL=sqlite3:storage/test.sqlite3
      - SELENIUM_HOST=selenium
      - SELENIUM_PORT=4444
      - AGRR_BIN_PATH=/app/lib/core/agrr  # 明示的にvolume-mountedバイナリを指定
      - WEATHER_DATA_SOURCE=nasa-power  # NASA POWER: Global coverage (1984-present)
      - USE_AGRR_DAEMON=true  # 統合テストではdaemonを使用
    command: bash -c "tail -f /dev/null"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    profiles:
      - test-integration
    # depends_on:
    #   - selenium  # Seleniumは統合テストでのみ必要

  # Selenium for system tests
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: 2gb
    environment:
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
    profiles:
      - test

volumes:
  bundle_data:
  bundle_cache:
  storage_dev_data:   # 開発環境用永続ストレージ
