# lib/domain → Rust 移行進捗（機械可読）
# TRACKING.md は scripts/sync-lib-domain-rust-tracking.sh で再生成する。
#
# phase: not_started | design | dev | test | done
# rust_module: crates/agrr-domain/src/<path> または "—"

program_version: 1
updated_by: sync-script

waves:
  - id: wave-0-foundation
    name: 基盤 + shared パイロット
    contexts: [shared]
  - id: wave-1-shared
    name: shared 完遂
    contexts: [shared]
  - id: wave-2-small
    name: 小型 BC
    contexts:
      - api_keys
      - auth
      - backdoor
      - contact_messages
      - internal_jobs
  - id: wave-3-medium
    name: 中型 BC
    contexts:
      - deletion_undo
      - interaction_rule
      - public_plan
      - field
      - agricultural_task
      - fertilize
      - pesticide
      - farm
      - pest
  - id: wave-4-large
    name: 大型 BC
    contexts:
      - field_cultivation
      - weather_data
      - crop
  - id: wave-5-cultivation-plan
    name: cultivation_plan
    contexts: [cultivation_plan]

