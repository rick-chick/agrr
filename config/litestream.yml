# Litestream configuration for Cloud Storage replication
# Replicates primary, cache, cable. Queue excluded to avoid database is locked.
# All paths are prefixed with 'production/' to ensure complete separation from development
dbs:
  # Main application database
  - path: /tmp/production.sqlite3
    replicas:
      - type: gcs
        bucket: ${GCS_BUCKET}
        path: production/primary.sqlite3
        retention: 24h
        sync-interval: 30s
  
  # Solid Queue: excluded from replication to avoid database is locked (Litestream
  # checkpoint vs SolidQueue Worker/Dispatcher). Queue is ephemeral; jobs are
  # re-enqueued from recurring schedule on restart.
  #
  # Solid Cache database (optional backup - cache can be recreated)
  - path: /tmp/production_cache.sqlite3
    replicas:
      - type: gcs
        bucket: ${GCS_BUCKET}
        path: production/cache.sqlite3
        retention: 24h
        sync-interval: 300s
  
  # Solid Cable database (Action Cable messages)
  - path: /tmp/production_cable.sqlite3
    replicas:
      - type: gcs
        bucket: ${GCS_BUCKET}
        path: production/cable.sqlite3
        retention: 24h
        sync-interval: 60s

