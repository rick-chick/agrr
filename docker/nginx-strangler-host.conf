worker_processes 1;
error_log /tmp/agrr-strangler-nginx-error.log warn;

events {
  worker_connections 1024;
}

http {
  access_log off;

  upstream rust_backend {
    server 127.0.0.1:8080;
  }

  server {
    listen 3000;
    server_name localhost 127.0.0.1;

    location /health {
      proxy_pass http://rust_backend;
    }

    location /up {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
    }

    location /auth/test/ {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
    }

    location /auth/ {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/[a-z][a-z]/auth/login {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
    }

    location /cable {
      proxy_pass http://rust_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location = /undo_deletion {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
    }

    # All JSON API → Rust (no Rails fallback). Unregistered paths get 501 from agrr-server.
    location /api/ {
      proxy_pass http://rust_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      return 404;
    }
  }
}
