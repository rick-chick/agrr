# Dispatches the Cursor Issue Worker when an issue is opened or labeled agent-ready / agent-close.
#
# Setup:
# 1. Create a Cursor Automation with a Webhook trigger (prompt references
#    .cursor/skills/github-issue-worker/SKILL.md). Remove Schedule trigger if migrating from cron.
# 2. Add repository secret CURSOR_ISSUE_WORKER_WEBHOOK_URL (webhook URL).
# 3. Add repository secret CURSOR_ISSUE_WORKER_WEBHOOK_KEY (webhook API key).
# 4. Create labels: agent-ready, agent-close, agent-in-progress, agent-blocked, agent-closed, agent-skipped
# 5. Cancelled dispatches are retried by issue-worker-retry-dispatch.yml

name: Issue Worker Dispatch

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: issue-worker-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue context
        id: issue
        env:
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_BODY_INPUT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { resolveDispatchAction } from './scripts/issue-worker-dispatch-lib.mjs';
            const result = resolveDispatchAction({
              eventAction: process.env.EVENT_ACTION,
              labelName: process.env.LABEL_NAME ?? '',
              issueAuthor: process.env.ISSUE_AUTHOR,
              issueLabels: process.env.ISSUE_LABELS ?? '',
            });
            process.stdout.write(JSON.stringify(result));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          else
            echo "action=$(echo "$RESULT" | jq -r '.action')" >> "$GITHUB_OUTPUT"
            BODY_B64=$(printf '%s' "$ISSUE_BODY_INPUT" | base64 -w0)
            echo "body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
            echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Cursor Issue Worker
        if: steps.issue.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_ISSUE_WORKER_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_ISSUE_WORKER_WEBHOOK_KEY }}
          ACTION: ${{ steps.issue.outputs.action }}
          BODY_B64: ${{ steps.issue.outputs.body_b64 }}
          LABELS: ${{ steps.issue.outputs.labels }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_KEY:-}" ]; then
            echo "CURSOR_ISSUE_WORKER_WEBHOOK_URL or CURSOR_ISSUE_WORKER_WEBHOOK_KEY is not set."
            echo "Configure secrets after creating the Cursor Automation webhook."
            exit 0
          fi
          ISSUE_BODY=$(printf '%s' "$BODY_B64" | base64 -d)
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson number "${{ github.event.issue.number }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg action "$ACTION" \
            --arg labels "$LABELS" \
            --arg body "$ISSUE_BODY" \
            '{repository: $repo, issue_number: $number, issue_title: $title, issue_url: $url, action: $action, labels: $labels, issue_body: $body}')
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $WEBHOOK_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Skip dispatch
        if: steps.issue.outputs.skip == 'true'
        run: 'echo "Skipped: ${{ steps.issue.outputs.skip_reason }}"'
