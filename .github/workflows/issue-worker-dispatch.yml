# Dispatches the Delivery Agent when an issue is opened or labeled agent-ready / agent-close.
#
# Setup:
# 1. Create a Cursor Automation with a Webhook trigger (prompt references
#    .cursor/skills/delivery-agent/SKILL.md). Remove Schedule trigger if migrating from cron.
# 2. Add repository secret CURSOR_DELIVERY_WEBHOOK_URL (webhook URL).
# 3. Add repository secret CURSOR_DELIVERY_WEBHOOK_KEY (webhook API key).
# 4. Create labels: agent-ready, agent-close, agent-in-progress, agent-closed
# 5. Cancelled or failed dispatches are retried by issue-worker-retry-dispatch.yml

name: Issue Worker Dispatch

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: issue-worker-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue context
        id: issue
        env:
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { resolveDispatchAction } from './scripts/issue-worker-dispatch-lib.mjs';
            const result = resolveDispatchAction({
              eventAction: process.env.EVENT_ACTION,
              labelName: process.env.LABEL_NAME ?? '',
              issueAuthor: process.env.ISSUE_AUTHOR,
              issueLabels: process.env.ISSUE_LABELS ?? '',
            });
            process.stdout.write(JSON.stringify(result));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          else
            echo "action=$(echo "$RESULT" | jq -r '.action')" >> "$GITHUB_OUTPUT"
            echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip implement when open fix/closes PR exists
        id: implement_gate
        if: steps.issue.outputs.skip != 'true' && steps.issue.outputs.action == 'implement'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION: ${{ steps.issue.outputs.action }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { execFileSync } from 'node:child_process';
            import {
              openFixPrSearchQuery,
              resolveImplementDispatchGate,
            } from './scripts/issue-worker-dispatch-lib.mjs';
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const search = openFixPrSearchQuery(issueNumber);
            const raw = execFileSync(
              'gh',
              ['pr', 'list', '--repo', '${{ github.repository }}', '--state', 'open', '--search', search, '--json', 'number'],
              { encoding: 'utf8' },
            );
            const hasOpenFixPr = JSON.parse(raw).length > 0;
            const gate = resolveImplementDispatchGate({
              action: process.env.ACTION,
              hasOpenFixPr,
            });
            process.stdout.write(JSON.stringify(gate));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve final dispatch action
        id: final_action
        if: steps.issue.outputs.skip != 'true' && steps.implement_gate.outputs.skip != 'true'
        env:
          ACTION: ${{ steps.issue.outputs.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { resolveEpicDispatchAction } from './scripts/issue-worker-dispatch-lib.mjs';
            const remapped = resolveEpicDispatchAction({
              action: process.env.ACTION,
              issueTitle: process.env.ISSUE_TITLE ?? '',
              issueLabels: process.env.ISSUE_LABELS ?? '',
            });
            process.stdout.write(JSON.stringify(remapped));
          ")
          echo "action=$(echo "$RESULT" | jq -r '.action')" >> "$GITHUB_OUTPUT"

      - name: Resolve agent dependency cache
        id: deps_resolve
        if: steps.issue.outputs.skip != 'true' && steps.final_action.outputs.action == 'implement' && steps.implement_gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CURSOR_DELIVERY_WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          CURSOR_DELIVERY_WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
        run: |
          set -euo pipefail
          node scripts/issue-worker-deps-resolve.mjs \
            --repo "${{ github.repository }}" \
            --number "${{ github.event.issue.number }}"

      - name: Skip implement when dependencies are open
        id: dependency_gate
        if: steps.issue.outputs.skip != 'true' && steps.final_action.outputs.action == 'implement' && steps.implement_gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          RESULT=$(node scripts/run-issue-worker-dependency-gate.mjs)
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason // "unknown"')" >> "$GITHUB_OUTPUT"
            OPEN_DEPS=$(echo "$RESULT" | jq -c '.openDependencies // []')
            echo "open_dependencies=$OPEN_DEPS" >> "$GITHUB_OUTPUT"
            CIRCULAR=$(echo "$RESULT" | jq -r '.circular // false')
            echo "circular=$CIRCULAR" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when dependency gate blocks dispatch
        if: steps.dependency_gate.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OPEN_DEPENDENCIES: ${{ steps.dependency_gate.outputs.open_dependencies }}
          SKIP_REASON: ${{ steps.dependency_gate.outputs.skip_reason }}
          CIRCULAR: ${{ steps.dependency_gate.outputs.circular }}
        run: |
          set -euo pipefail
          COMMENT=$(node --input-type=module -e "
            import { formatDependencyGateBlockComment } from './scripts/issue-worker-dispatch-lib.mjs';
            const openDependencies = JSON.parse(process.env.OPEN_DEPENDENCIES ?? '[]');
            process.stdout.write(formatDependencyGateBlockComment({
              skipReason: process.env.SKIP_REASON ?? '',
              openDependencies,
              circular: process.env.CIRCULAR === 'true',
            }));
          ")
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT"

      - name: Trigger Delivery Agent
        if: >-
          steps.issue.outputs.skip != 'true'
          && steps.implement_gate.outputs.skip != 'true'
          && steps.dependency_gate.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          LABELS: ${{ steps.issue.outputs.labels }}
        run: node scripts/post-issue-worker-dispatch.mjs

      - name: Skip dispatch
        if: >-
          steps.issue.outputs.skip == 'true'
          || steps.implement_gate.outputs.skip == 'true'
          || steps.dependency_gate.outputs.skip == 'true'
        run: |
          REASON="${{ steps.issue.outputs.skip_reason }}"
          if [ -z "$REASON" ]; then
            REASON="${{ steps.implement_gate.outputs.skip_reason }}"
          fi
          if [ -z "$REASON" ]; then
            REASON="${{ steps.dependency_gate.outputs.skip_reason }}"
          fi
          echo "Skipped: $REASON"
