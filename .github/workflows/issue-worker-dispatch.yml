# Dispatches the Cursor Issue Worker when an issue is opened or labeled agent-ready / agent-close.
#
# Setup:
# 1. Create a Cursor Automation with a Webhook trigger (prompt references
#    .cursor/skills/github-issue-worker/SKILL.md). Remove Schedule trigger if migrating from cron.
# 2. Add repository secret CURSOR_ISSUE_WORKER_WEBHOOK_URL (webhook URL).
# 3. Add repository secret CURSOR_ISSUE_WORKER_WEBHOOK_KEY (webhook API key).
# 4. Create labels: agent-ready, agent-close, agent-in-progress, agent-blocked, agent-closed, agent-skipped
# 5. Cancelled or failed dispatches are retried by issue-worker-retry-dispatch.yml

name: Issue Worker Dispatch

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: issue-worker-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue context
        id: issue
        env:
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_BODY_INPUT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { resolveDispatchAction } from './scripts/issue-worker-dispatch-lib.mjs';
            const result = resolveDispatchAction({
              eventAction: process.env.EVENT_ACTION,
              labelName: process.env.LABEL_NAME ?? '',
              issueAuthor: process.env.ISSUE_AUTHOR,
              issueLabels: process.env.ISSUE_LABELS ?? '',
            });
            process.stdout.write(JSON.stringify(result));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          else
            echo "action=$(echo "$RESULT" | jq -r '.action')" >> "$GITHUB_OUTPUT"
            BODY_B64=$(printf '%s' "$ISSUE_BODY_INPUT" | base64 -w0)
            echo "body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
            echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip implement when open fix/closes PR exists
        id: implement_gate
        if: steps.issue.outputs.skip != 'true' && steps.issue.outputs.action == 'implement'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION: ${{ steps.issue.outputs.action }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { execFileSync } from 'node:child_process';
            import {
              openFixPrSearchQuery,
              resolveImplementDispatchGate,
            } from './scripts/issue-worker-dispatch-lib.mjs';
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const search = openFixPrSearchQuery(issueNumber);
            const raw = execFileSync(
              'gh',
              ['pr', 'list', '--repo', '${{ github.repository }}', '--state', 'open', '--search', search, '--json', 'number'],
              { encoding: 'utf8' },
            );
            const hasOpenFixPr = JSON.parse(raw).length > 0;
            const gate = resolveImplementDispatchGate({
              action: process.env.ACTION,
              hasOpenFixPr,
            });
            process.stdout.write(JSON.stringify(gate));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip epic issues on implement dispatch
        id: epic_gate
        if: steps.issue.outputs.skip != 'true' && steps.issue.outputs.action == 'implement' && steps.implement_gate.outputs.skip != 'true'
        env:
          ACTION: ${{ steps.issue.outputs.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { resolveEpicImplementGate } from './scripts/issue-worker-dispatch-lib.mjs';
            const gate = resolveEpicImplementGate({
              action: process.env.ACTION,
              issueTitle: process.env.ISSUE_TITLE ?? '',
              issueLabels: process.env.ISSUE_LABELS ?? '',
            });
            process.stdout.write(JSON.stringify(gate));
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve agent dependency cache
        id: deps_resolve
        if: steps.issue.outputs.skip != 'true' && steps.issue.outputs.action == 'implement' && steps.implement_gate.outputs.skip != 'true' && steps.epic_gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CURSOR_ISSUE_WORKER_DEPS_WEBHOOK_URL: ${{ secrets.CURSOR_ISSUE_WORKER_DEPS_WEBHOOK_URL }}
          CURSOR_ISSUE_WORKER_DEPS_WEBHOOK_KEY: ${{ secrets.CURSOR_ISSUE_WORKER_DEPS_WEBHOOK_KEY }}
        run: |
          set -euo pipefail
          node scripts/issue-worker-deps-resolve.mjs \
            --repo "${{ github.repository }}" \
            --number "${{ github.event.issue.number }}"

      - name: Skip implement when dependencies are open
        id: dependency_gate
        if: steps.issue.outputs.skip != 'true' && steps.issue.outputs.action == 'implement' && steps.implement_gate.outputs.skip != 'true' && steps.epic_gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY_INPUT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          RESULT=$(node --input-type=module -e "
            import { execFileSync } from 'node:child_process';
            import { resolveDependencyGateFromAgentCache } from './scripts/issue-worker-dispatch-lib.mjs';
            import { createGetAgentDepsContractFromComments } from './scripts/issue-worker-deps-agent-lib.mjs';

            const repo = '${{ github.repository }}';
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueBody = process.env.ISSUE_BODY_INPUT ?? '';

            function ghIssueView(number) {
              const raw = execFileSync(
                'gh',
                ['issue', 'view', String(number), '--repo', repo, '--json', 'state,body'],
                { encoding: 'utf8' },
              );
              return JSON.parse(raw);
            }

            function fetchIssueComments(number) {
              const raw = execFileSync(
                'gh',
                [
                  'api',
                  \`repos/\${repo}/issues/\${number}/comments\`,
                  '--paginate',
                  '--jq',
                  '.[] | {body, createdAt: .created_at}',
                ],
                { encoding: 'utf8' },
              );
              const lines = raw.trim().split('\\n').filter(Boolean);
              if (lines.length === 0) {
                return [];
              }
              return lines.map((line) => JSON.parse(line));
            }

            const getAgentDepsContract = createGetAgentDepsContractFromComments(
              async (number) => fetchIssueComments(number),
            );

            try {
              const gate = await resolveDependencyGateFromAgentCache({
                issueNumber,
                issueBody,
                getAgentDepsContract,
                fetchIssueState: async (number) => ghIssueView(number).state,
                fetchIssueBody: async (number) => ghIssueView(number).body ?? '',
              });
              process.stdout.write(JSON.stringify(gate));
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              if (!/circular dependency/i.test(message)) {
                throw error;
              }
              process.stdout.write(JSON.stringify({
                skip: true,
                skipReason: message,
                openDependencies: [],
                circular: true,
              }));
            }
          ")
          SKIP=$(echo "$RESULT" | jq -r '.skip')
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason')" >> "$GITHUB_OUTPUT"
            OPEN_DEPS=$(echo "$RESULT" | jq -c '.openDependencies // []')
            echo "open_dependencies=$OPEN_DEPS" >> "$GITHUB_OUTPUT"
            CIRCULAR=$(echo "$RESULT" | jq -r '.circular // false')
            echo "circular=$CIRCULAR" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when dependency gate blocks dispatch
        if: steps.dependency_gate.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OPEN_DEPENDENCIES: ${{ steps.dependency_gate.outputs.open_dependencies }}
          SKIP_REASON: ${{ steps.dependency_gate.outputs.skip_reason }}
          CIRCULAR: ${{ steps.dependency_gate.outputs.circular }}
        run: |
          set -euo pipefail
          COMMENT=$(node --input-type=module -e "
            import { formatDependencyGateComment } from './scripts/issue-worker-dispatch-lib.mjs';
            const circular = process.env.CIRCULAR === 'true';
            if (circular) {
              process.stdout.write([
                '## 🤖 Issue Worker: dispatch 保留（依存の循環参照）',
                '',
                process.env.SKIP_REASON ?? 'circular dependency detected',
                '',
                '依存関係を修正してから \`agent-ready\` を付け直してください。',
              ].join('\\n'));
            } else {
              const openDependencies = JSON.parse(process.env.OPEN_DEPENDENCIES ?? '[]');
              process.stdout.write(formatDependencyGateComment(openDependencies));
            }
          ")
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT"

      - name: Trigger Cursor Issue Worker
        if: >-
          steps.issue.outputs.skip != 'true'
          && steps.implement_gate.outputs.skip != 'true'
          && steps.epic_gate.outputs.skip != 'true'
          && steps.dependency_gate.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_ISSUE_WORKER_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_ISSUE_WORKER_WEBHOOK_KEY }}
          ACTION: ${{ steps.issue.outputs.action }}
          BODY_B64: ${{ steps.issue.outputs.body_b64 }}
          LABELS: ${{ steps.issue.outputs.labels }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_KEY:-}" ]; then
            echo "CURSOR_ISSUE_WORKER_WEBHOOK_URL or CURSOR_ISSUE_WORKER_WEBHOOK_KEY is not set."
            echo "Configure secrets after creating the Cursor Automation webhook."
            exit 0
          fi
          ISSUE_BODY=$(printf '%s' "$BODY_B64" | base64 -d)
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson number "${{ github.event.issue.number }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg action "$ACTION" \
            --arg labels "$LABELS" \
            --arg body "$ISSUE_BODY" \
            '{repository: $repo, issue_number: $number, issue_title: $title, issue_url: $url, action: $action, labels: $labels, issue_body: $body}')
          printf '%s' "$payload" | node scripts/post-cursor-webhook.mjs

      - name: Skip dispatch
        if: >-
          steps.issue.outputs.skip == 'true'
          || steps.implement_gate.outputs.skip == 'true'
          || steps.epic_gate.outputs.skip == 'true'
          || steps.dependency_gate.outputs.skip == 'true'
        run: |
          REASON="${{ steps.issue.outputs.skip_reason }}"
          if [ -z "$REASON" ]; then
            REASON="${{ steps.implement_gate.outputs.skip_reason }}"
          fi
          if [ -z "$REASON" ]; then
            REASON="${{ steps.epic_gate.outputs.skip_reason }}"
          fi
          if [ -z "$REASON" ]; then
            REASON="${{ steps.dependency_gate.outputs.skip_reason }}"
          fi
          echo "Skipped: $REASON"
