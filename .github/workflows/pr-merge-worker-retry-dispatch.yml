# Reconcile PR Merge Worker dispatch for stuck open master PRs
# (BEHIND/CONFLICT, CI fail, stuck_retry, or primary dispatch cancelled/failed).
#
# Triggers:
# - schedule: every 15 minutes (reconcile one eligible PR: conflict or stuck_retry)
# - workflow_run: PR Merge Worker Dispatch completed with conclusion cancelled or failure (reconcile)
# - workflow_dispatch: manual reconcile for one PR

name: PR Merge Worker Retry Dispatch

on:
  workflow_run:
    workflows:
      - PR Merge Worker Dispatch
    types: [completed]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number to retry (default reconciles one eligible PR)
        required: false
        type: number

concurrency:
  group: pr-merge-worker-retry-dispatch
  cancel-in-progress: false

jobs:
  retry:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for concurrent dispatches to settle
        if: github.event_name == 'workflow_run'
        run: sleep 90

      - name: Retry from cancelled or failed dispatch run
        if: github.event_name == 'workflow_run'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          if [ "$WORKFLOW_CONCLUSION" = "cancelled" ]; then
            RETRY_REASON=dispatch_run_cancelled
          elif [ "$WORKFLOW_CONCLUSION" = "failure" ]; then
            RETRY_REASON=dispatch_run_failed
          else
            echo "Unexpected workflow_run conclusion: $WORKFLOW_CONCLUSION"
            exit 0
          fi
          node scripts/pr-merge-worker-retry-dispatch.mjs reconcile \
            --retry-reason "$RETRY_REASON"

      - name: Reconcile stuck agent-merge PRs (conflict or stuck_retry)
        if: github.event_name == 'schedule'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node scripts/pr-merge-worker-retry-dispatch.mjs reconcile \
            --retry-reason scheduled_reconcile

      - name: Manual retry
        if: github.event_name == 'workflow_dispatch'
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          if [ -n "${PR_NUMBER:-}" ]; then
            node scripts/pr-merge-worker-retry-dispatch.mjs pr \
              --number "$PR_NUMBER" \
              --retry-reason manual_retry
          else
            node scripts/pr-merge-worker-retry-dispatch.mjs reconcile \
              --retry-reason manual_reconcile
          fi
