# RuboCop / Brakeman / ng lint
name: Lint

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

jobs:
  rails-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.10"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

      - name: Brakeman
        run: bundle exec brakeman -q --no-pager -z

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (ng lint)
        run: npx ng lint
