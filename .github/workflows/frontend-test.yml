# Angular: unit test / build
name: Frontend test

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - master

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Route manifest coverage
        run: npm run test:route-manifest-coverage

      - name: Route manifest freshness
        run: npm run e2e:manifest:check

      - name: Visual review pattern freshness
        run: npm run e2e:visual-review:check

      - name: Unit tests
        run: npm test -- --watch=false

      - name: Production build
        run: npm run build

      - name: ng serve proxy contract
        run: npm run check:proxy-conf

      - name: UX findings collector unit tests
        working-directory: ${{ github.workspace }}
        run: node --test .cursor/skills/ux-issue-creator/scripts/collect-ux-findings.test.mjs

      - name: check-hardcoded-i18n unit tests
        working-directory: frontend
        run: node --test scripts/check-hardcoded-i18n.test.mjs

      - name: generate-e2e-route-manifest unit tests
        working-directory: frontend
        run: node --test scripts/generate-e2e-route-manifest.test.mjs

      - name: verify-visual-review-fresh unit tests
        working-directory: frontend
        run: node --test e2e/agent-review/verify-visual-review-fresh.test.mjs

      - name: apply-resolved-url unit tests
        working-directory: frontend
        run: node --test e2e/apply-resolved-url.test.mjs

      - name: resolve-capture-urls scope unit tests
        working-directory: frontend
        run: node --test e2e/resolve-capture-urls-scope.test.mjs

      - name: verify-e2e-smoke-ci-workflow unit tests
        working-directory: ${{ github.workspace }}
        run: node --test scripts/verify-e2e-smoke-ci-workflow.test.mjs

      - name: verify-e2e-capture-ci-workflow unit tests
        working-directory: ${{ github.workspace }}
        run: node --test scripts/verify-e2e-capture-ci-workflow.test.mjs

      - name: ensure-e2e-baseline bodies unit tests
        working-directory: frontend
        run: node --test e2e/fixtures/ensure-e2e-baseline-bodies.test.mjs

      - name: entry-schedule ids unit tests
        working-directory: frontend
        run: node --test e2e/shared/entry-schedule-ids-lib.test.mjs

      - name: e2e baseline-ids and route-validity lib unit tests
        working-directory: frontend
        run: node --test e2e/shared/baseline-ids-lib.test.mjs e2e/route-validity-lib.test.mjs
