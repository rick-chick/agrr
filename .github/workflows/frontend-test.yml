# Angular: unit test / build
name: Frontend test

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - master

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Route manifest coverage
        run: npm run test:route-manifest-coverage

      - name: Unit tests
        run: npm test -- --watch=false

      - name: Production build
        run: npm run build

      - name: ng serve proxy contract
        run: npm run check:proxy-conf

      - name: UX findings collector unit tests
        working-directory: ${{ github.workspace }}
        run: node --test .cursor/skills/ux-issue-creator/scripts/collect-ux-findings.test.mjs

      - name: check-hardcoded-i18n unit tests
        working-directory: frontend
        run: node --test scripts/check-hardcoded-i18n.test.mjs
