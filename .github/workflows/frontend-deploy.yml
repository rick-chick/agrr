name: Frontend deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  # Default values; override via repository Secrets or per-job env
  REGION: us-central1

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    uses: ./.github/workflows/frontend-test.yml

  lint:
    uses: ./.github/workflows/lint.yml

  check-deploy-secrets:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "GCP deploy secrets are not configured; skipping build-and-deploy."
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [frontend-test, lint, check-deploy-secrets]
    if: needs.check-deploy-secrets.outputs.configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Run deploy script
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ env.REGION }}
          # PRs use test buckets; pushes use production buckets.
          BUCKET_NAME: ${{ github.event_name == 'pull_request' && secrets.FRONTEND_TEST_BUCKET_NAME || secrets.FRONTEND_BUCKET_NAME }}
          API_BASE_URL: ${{ github.event_name == 'pull_request' && secrets.FRONTEND_TEST_API_BASE_URL || secrets.FRONTEND_API_BASE_URL }}
          URL_MAP_NAME: ${{ secrets.URL_MAP_NAME }}
        run: |
          chmod +x ./.cursor/skills/deploy-frontend/scripts/gcp-frontend-deploy.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./.cursor/skills/deploy-frontend/scripts/gcp-frontend-deploy.sh deploy test
          else
            ./.cursor/skills/deploy-frontend/scripts/gcp-frontend-deploy.sh deploy production
          fi
