# Dispatches the Delivery Agent for PRs targeting master (opt-out only).
#
# CI dispatch: Backend test workflow_run only (once per push; avoids check_suite / per-job duplicates).
#   On ci_completed: green → merge path; failed required CI → ci_fix (draft or ready).
# PR dispatch: opened / labeled / synchronize / ready_for_review; conflict when BEHIND/DIRTY/CONFLICTING.
# Conflict dispatch: PR synchronize / ready_for_review when BEHIND/DIRTY/CONFLICTING (minus blockers).
# Master-push BEHIND/CONFLICT rescue: pr-merge-worker-retry-dispatch reconcile (15 min cron).
#
# Setup: see .cursor/skills/delivery-agent/SKILL.md

name: PR Merge Worker Dispatch

on:
  pull_request:
    types: [opened, labeled, synchronize, ready_for_review]
    branches: [master]
  workflow_run:
    workflows:
      - Backend test
    types: [completed]

concurrency:
  group: pr-merge-dispatch-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || format('master-{0}', github.sha) }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve pull request context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY_INPUT: ${{ github.event.pull_request.body }}
          PR_TITLE_INPUT: ${{ github.event.pull_request.title }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_PRS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            ACTION="${{ github.event.action }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            PR_BODY_B64=$(printf '%s' "$PR_BODY_INPUT" | base64 -w0)
            PR_TITLE_B64=$(printf '%s' "$PR_TITLE_INPUT" | base64 -w0)
            LABEL_NAME="${{ github.event.label.name }}"
            LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
            PR_URL='${{ github.event.pull_request.html_url }}'
            PR_AUTHOR='${{ github.event.pull_request.user.login }}'
          else
            ACTION="ci_completed"
            HEAD_SHA="$WORKFLOW_RUN_HEAD_SHA"
            RESULT=$(REPO='${{ github.repository }}' HEAD_SHA="$WORKFLOW_RUN_HEAD_SHA" node scripts/resolve-workflow-run-pr-from-gh.mjs)
            SKIP=$(echo "$RESULT" | jq -r 'if .skip then "true" else "false" end')
            if [ "$SKIP" = "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason // "unknown"')" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUMBER=$(echo "$RESULT" | jq -r '.number')
            HEAD_REF=$(echo "$RESULT" | jq -r '.headRef')
            PR_BODY_B64=$(echo "$RESULT" | jq -r '.body' | base64 -w0)
            PR_TITLE_B64=$(echo "$RESULT" | jq -r '.title' | base64 -w0)
            LABEL_NAME=""
            LABELS=$(echo "$RESULT" | jq -r '.labels')
            PR_URL=$(echo "$RESULT" | jq -r '.url')
            PR_AUTHOR=$(echo "$RESULT" | jq -r '.author')
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "title_b64=$PR_TITLE_B64" >> "$GITHUB_OUTPUT"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          echo "label_name=$LABEL_NAME" >> "$GITHUB_OUTPUT"
          echo "body_b64=$PR_BODY_B64" >> "$GITHUB_OUTPUT"

      - name: Trigger Delivery Agent
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          ACTION: ${{ steps.pr.outputs.action }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          AUTHOR: ${{ steps.pr.outputs.author }}
          LABELS: ${{ steps.pr.outputs.labels }}
          LABEL_NAME: ${{ steps.pr.outputs.label_name }}
          BODY_B64: ${{ steps.pr.outputs.body_b64 }}
          TITLE_B64: ${{ steps.pr.outputs.title_b64 }}
        run: |
          set -euo pipefail
          PR_TITLE=$(printf '%s' "$TITLE_B64" | base64 -d)

          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_KEY:-}" ]; then
            echo "CURSOR_DELIVERY_WEBHOOK_URL or CURSOR_DELIVERY_WEBHOOK_KEY is not set."
            echo "Configure secrets after creating the Delivery Agent Automation webhook."
            exit 0
          fi

          if echo "$LABELS" | grep -qE '(^|,)agent-no-merge(,|$)|(^|,)do-not-merge(,|$)|(^|,)wip(,|$)|(^|,)agent-merge-blocked(,|$)'; then
            echo "PR has a merge-blocking label; skipping."
            exit 0
          fi

          if echo "$LABELS" | grep -qE '(^|,)agent-merge-in-progress(,|$)'; then
            echo "agent-merge-in-progress; skipping duplicate dispatch."
            exit 0
          fi

          if [ "$ACTION" = "labeled" ] && [ "$LABEL_NAME" != "agent-merge" ]; then
            echo "labeled event is not agent-merge; skipping."
            exit 0
          fi

          # Universal rescue / merge: opt-out only (blocking labels above). No branch-prefix opt-in.

          PR_META=$(gh pr view "$PR_NUMBER" --json isDraft,reviewDecision,baseRefName,headRefOid,headRepository,title,mergeable,mergeStateStatus)
          IS_DRAFT=$(echo "$PR_META" | jq -r '.isDraft')
          REVIEW_DECISION=$(echo "$PR_META" | jq -r '.reviewDecision // ""')
          BASE_REF=$(echo "$PR_META" | jq -r '.baseRefName')
          HEAD_OID=$(echo "$PR_META" | jq -r '.headRefOid')
          HEAD_OWNER=$(echo "$PR_META" | jq -r '.headRepository.nameWithOwner' | cut -d/ -f1)
          BASE_OWNER=$(gh repo view --json owner -q .owner.login)
          TITLE=$(echo "$PR_META" | jq -r '.title')
          MERGEABLE_STATE=$(echo "$PR_META" | jq -r '.mergeable // ""')
          MERGE_STATE_STATUS=$(echo "$PR_META" | jq -r '.mergeStateStatus // ""')

          if [ "$MERGEABLE_STATE" = "UNKNOWN" ]; then
            for _ in 1 2 3 4 5; do
              sleep 2
              MERGEABLE_STATE=$(gh pr view "$PR_NUMBER" --json mergeable -q .mergeable)
              [ "$MERGEABLE_STATE" != "UNKNOWN" ] && break
            done
            MERGE_STATE_STATUS=$(gh pr view "$PR_NUMBER" --json mergeStateStatus -q .mergeStateStatus)
          fi

          NEEDS_SYNC=false
          if [ "$MERGEABLE_STATE" = "CONFLICTING" ] || [ "$MERGE_STATE_STATUS" = "DIRTY" ] || [ "$MERGE_STATE_STATUS" = "BEHIND" ]; then
            NEEDS_SYNC=true
            ACTION="conflict"
            echo "PR needs master sync (mergeable=$MERGEABLE_STATE mergeStateStatus=$MERGE_STATE_STATUS); dispatching conflict resolution."
          elif [ "$ACTION" = "synchronize" ]; then
            echo "synchronize event without merge conflicts; skipping (CI completed will dispatch)."
            exit 0
          fi

          if [ "$NEEDS_SYNC" != "true" ]; then
            CHECKS_JSON=$(gh pr checks "$PR_NUMBER" --json name,state)
            REQUIRED_CI_STATE=$(CHECKS_JSON="$CHECKS_JSON" node scripts/classify-required-ci-state.mjs)
            if [ "$REQUIRED_CI_STATE" = "failed" ]; then
              ACTION="ci_fix"
              echo "Required CI failed; dispatching ci_fix."
            elif [ "$IS_DRAFT" = "true" ]; then
              echo "Draft PR without conflict/sync need and CI not failed; skipping."
              exit 0
            elif [ "$REQUIRED_CI_STATE" = "incomplete" ] && [ "$ACTION" = "ci_completed" ]; then
              echo "Required checks still pending on ci_completed; skipping dispatch."
              exit 0
            fi
          fi
          if [ "$HEAD_OWNER" != "$BASE_OWNER" ]; then
            echo "Fork PR (head owner $HEAD_OWNER != base owner $BASE_OWNER); skipping."
            exit 0
          fi
          if [ "$REVIEW_DECISION" = "CHANGES_REQUESTED" ]; then
            echo "Changes requested review; skipping."
            exit 0
          fi
          if [ "$BASE_REF" != "master" ]; then
            echo "Base branch is not master; skipping."
            exit 0
          fi
          if echo "$TITLE" | grep -qiE '\[(WIP|DRAFT)\]'; then
            echo "Title contains [WIP] or [DRAFT]; skipping."
            exit 0
          fi
          if [ "$ACTION" != "conflict" ] && [ "$HEAD_OID" != "$HEAD_SHA" ]; then
            echo "Resolved head SHA ($HEAD_SHA) != current PR head ($HEAD_OID); skipping stale dispatch."
            exit 0
          fi

          if [ "$ACTION" = "conflict" ] || [ "$ACTION" = "ci_fix" ]; then
            echo "skipping CI gate for ${ACTION} resolution"
          fi

          PR_BODY=$(printf '%s' "$BODY_B64" | base64 -d)
          payload=$(REPOSITORY="${{ github.repository }}" PR_NUMBER="$PR_NUMBER" PR_TITLE="$PR_TITLE" PR_URL="$PR_URL" node --input-type=module -e "
            import {
              buildDeliveryPrPayload,
              deliveryPrWebhookPayloadIsDispatchable,
              resolveIssueNumberFromPrBody,
            } from './scripts/delivery-dispatch-lib.mjs';
            const payload = buildDeliveryPrPayload({
              repository: process.env.REPOSITORY,
              prNumber: Number(process.env.PR_NUMBER),
              issueNumber: resolveIssueNumberFromPrBody(process.argv[1]),
              prTitle: process.env.PR_TITLE,
              prUrl: process.env.PR_URL,
            });
            if (!deliveryPrWebhookPayloadIsDispatchable(payload)) {
              console.log('PR has no linked issue for Delivery Agent webhook; skipping dispatch.');
              process.exit(0);
            }
            process.stdout.write(JSON.stringify(payload));
          " "$PR_BODY")
          if [ -z "$payload" ]; then
            exit 0
          fi
          printf '%s' "$payload" | node scripts/post-cursor-webhook.mjs
