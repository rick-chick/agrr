# Dispatches the Delivery Agent for PRs targeting master (opt-out only).
#
# CI dispatch: Backend test workflow_run only (once per push; avoids check_suite / per-job duplicates).
#   On ci_completed: green or failed required CI can resend the Delivery Agent webhook.
# PR dispatch: opened / labeled / synchronize / ready_for_review when structurally eligible.
# Sync rescue: PR synchronize / ready_for_review when BEHIND/DIRTY/CONFLICTING.
# Master-push BEHIND/CONFLICT rescue: pr-merge-worker-retry-dispatch reconcile (15 min cron).
#
# Setup: see .cursor/skills/delivery-agent/SKILL.md

name: PR Merge Worker Dispatch

on:
  pull_request:
    types: [opened, labeled, synchronize, ready_for_review]
    branches: [master]
  workflow_run:
    workflows:
      - Backend test
    types: [completed]

concurrency:
  group: pr-merge-dispatch-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || format('master-{0}', github.sha) }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve pull request context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_PRS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            ACTION="${{ github.event.action }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            LABEL_NAME="${{ github.event.label.name }}"
            LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
            PR_URL='${{ github.event.pull_request.html_url }}'
            PR_AUTHOR='${{ github.event.pull_request.user.login }}'
          else
            ACTION="ci_completed"
            HEAD_SHA="$WORKFLOW_RUN_HEAD_SHA"
            RESULT=$(REPO='${{ github.repository }}' HEAD_SHA="$WORKFLOW_RUN_HEAD_SHA" node scripts/resolve-workflow-run-pr-from-gh.mjs)
            SKIP=$(echo "$RESULT" | jq -r 'if .skip then "true" else "false" end')
            if [ "$SKIP" = "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=$(echo "$RESULT" | jq -r '.skipReason // "unknown"')" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUMBER=$(echo "$RESULT" | jq -r '.number')
            HEAD_REF=$(echo "$RESULT" | jq -r '.headRef')
            LABEL_NAME=""
            LABELS=$(echo "$RESULT" | jq -r '.labels')
            PR_URL=$(echo "$RESULT" | jq -r '.url')
            PR_AUTHOR=$(echo "$RESULT" | jq -r '.author')
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          echo "label_name=$LABEL_NAME" >> "$GITHUB_OUTPUT"

      - name: Trigger Delivery Agent
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_DELIVERY_WEBHOOK_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          ACTION: ${{ steps.pr.outputs.action }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          AUTHOR: ${{ steps.pr.outputs.author }}
          LABELS: ${{ steps.pr.outputs.labels }}
          LABEL_NAME: ${{ steps.pr.outputs.label_name }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_KEY:-}" ]; then
            echo "CURSOR_DELIVERY_WEBHOOK_URL or CURSOR_DELIVERY_WEBHOOK_KEY is not set."
            echo "Configure secrets after creating the Delivery Agent Automation webhook."
            exit 0
          fi

          PR_META=$(gh pr view "$PR_NUMBER" --json isDraft,reviewDecision,baseRefName,headRefOid,headRepository,mergeable,mergeStateStatus,closingIssuesReferences)
          IS_DRAFT=$(echo "$PR_META" | jq -r '.isDraft')
          REVIEW_DECISION=$(echo "$PR_META" | jq -r '.reviewDecision // ""')
          BASE_REF=$(echo "$PR_META" | jq -r '.baseRefName')
          HEAD_OID=$(echo "$PR_META" | jq -r '.headRefOid')
          HEAD_OWNER=$(echo "$PR_META" | jq -r '.headRepository.nameWithOwner' | cut -d/ -f1)
          BASE_OWNER=$(gh repo view --json owner -q .owner.login)
          MERGEABLE_STATE=$(echo "$PR_META" | jq -r '.mergeable // ""')
          MERGE_STATE_STATUS=$(echo "$PR_META" | jq -r '.mergeStateStatus // ""')

          if [ "$MERGEABLE_STATE" = "UNKNOWN" ]; then
            for _ in 1 2 3 4 5; do
              sleep 2
              MERGEABLE_STATE=$(gh pr view "$PR_NUMBER" --json mergeable -q .mergeable)
              [ "$MERGEABLE_STATE" != "UNKNOWN" ] && break
            done
            MERGE_STATE_STATUS=$(gh pr view "$PR_NUMBER" --json mergeStateStatus -q .mergeStateStatus)
          fi

          CHECKS_JSON=$(gh pr checks "$PR_NUMBER" --json name,state)
          REQUIRED_CI_STATE=$(CHECKS_JSON="$CHECKS_JSON" node scripts/classify-required-ci-state.mjs)

          CLOSING_ISSUE_COUNT=$(echo "$PR_META" | jq '.closingIssuesReferences | length')

          CLASSIFY_INPUT=$(jq -n \
            --arg labels "$LABELS" \
            --arg eventAction "$ACTION" \
            --arg labelName "$LABEL_NAME" \
            --argjson isDraft "$IS_DRAFT" \
            --argjson closingIssueCount "$CLOSING_ISSUE_COUNT" \
            --arg reviewDecision "$REVIEW_DECISION" \
            --arg baseRefName "$BASE_REF" \
            --arg headOwner "$HEAD_OWNER" \
            --arg baseOwner "$BASE_OWNER" \
            --arg headOid "$HEAD_OID" \
            --arg eventHeadSha "$HEAD_SHA" \
            --arg mergeable "$MERGEABLE_STATE" \
            --arg mergeStateStatus "$MERGE_STATE_STATUS" \
            --arg requiredCiState "$REQUIRED_CI_STATE" \
            '{
              labels: $labels,
              eventAction: $eventAction,
              labelName: $labelName,
              isDraft: $isDraft,
              closingIssueCount: $closingIssueCount,
              reviewDecision: $reviewDecision,
              baseRefName: $baseRefName,
              headOwner: $headOwner,
              baseOwner: $baseOwner,
              headOid: $headOid,
              eventHeadSha: $eventHeadSha,
              mergeable: $mergeable,
              mergeStateStatus: $mergeStateStatus,
              requiredCiState: $requiredCiState
            }')

          RESULT=$(INPUT_JSON="$CLASSIFY_INPUT" node scripts/classify-primary-pr-merge-dispatch.mjs)
          ELIGIBLE=$(echo "$RESULT" | jq -r '.eligible')
          if [ "$ELIGIBLE" != "true" ]; then
            echo "Skip: $(echo "$RESULT" | jq -r '.reason // "unknown"')"
            exit 0
          fi

          if [ "$REQUIRED_CI_STATE" = "failed" ]; then
            echo "Required CI failed; dispatching Delivery Agent webhook."
          elif [ "$MERGE_STATE_STATUS" = "BEHIND" ] || [ "$MERGE_STATE_STATUS" = "DIRTY" ] || [ "$MERGEABLE_STATE" = "CONFLICTING" ]; then
            echo "PR needs sync (mergeable=$MERGEABLE_STATE mergeStateStatus=$MERGE_STATE_STATUS); dispatching Delivery Agent webhook."
          fi

          CLOSING_ISSUES_JSON=$(echo "$PR_META" | jq -c '.closingIssuesReferences')
          payload=$(REPOSITORY="${{ github.repository }}" PR_NUMBER="$PR_NUMBER" CLOSING_ISSUES_JSON="$CLOSING_ISSUES_JSON" node --input-type=module -e "
            import {
              buildDeliveryPrPayloadFromPr,
              deliveryPrWebhookPayloadIsDispatchable,
            } from './scripts/delivery-dispatch-lib.mjs';
            const closingIssuesReferences = JSON.parse(process.env.CLOSING_ISSUES_JSON || '[]');
            const payload = buildDeliveryPrPayloadFromPr(
              { number: Number(process.env.PR_NUMBER), closingIssuesReferences },
              process.env.REPOSITORY,
            );
            if (!deliveryPrWebhookPayloadIsDispatchable(payload)) {
              console.log('PR webhook payload is not dispatchable; skipping dispatch.');
              process.exit(0);
            }
            process.stdout.write(JSON.stringify(payload));
          ")
          if [ -z "$payload" ]; then
            exit 0
          fi
          printf '%s' "$payload" | node scripts/post-cursor-webhook.mjs
