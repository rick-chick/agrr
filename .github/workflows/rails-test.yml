# Rails 全テスト（Docker Compose 専用 test プロファイル）
name: Rails test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: rails-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rails-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache migrated test DBs
        uses: actions/cache@v4
        with:
          path: .docker/test_db_cache
          key: test-db-${{ hashFiles('db/migrate/**/*.rb', 'db/cache_migrate/**/*.rb') }}
          restore-keys: |
            test-db-

      - name: Build test image
        run: docker compose --profile test build test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-agrr-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests via bin/test
        run: ./bin/test
