# Backend tests: agrr-domain (cargo) + R4 contract (agrr-r4-contract + agrr-server)
# CI invokes cargo and scripts directly; bin/test depends on gitignored .cursor/skills.
name: Backend test

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: rails-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rails-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Cache migrated test DBs
        uses: actions/cache@v4
        with:
          path: .docker/test_db_cache
          key: test-db-${{ hashFiles('crates/agrr-migrate/migrations/**/*.sql') }}
          restore-keys: |
            test-db-

      - name: Build test image
        run: docker compose --profile test build test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-agrr-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Run backend tests
        run: |
          cargo test -p agrr-domain
          cargo test -p agrr-adapters-sqlite -- '_gateway_test'
          AGRR_SERVER_CONTRACT_DOCKER_BUILD=1 bash ./scripts/run-rust-contract-tests.sh
