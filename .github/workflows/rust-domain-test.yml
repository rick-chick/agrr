# lib/domain Rust 移行: crates/agrr-domain 単体テスト
name: Rust domain test

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "docs/migration/lib-domain-rust/**"
      - "docs/migration/app-rust-stack/**"
      - "Dockerfile.agrr-server"
      - ".github/workflows/rust-domain-test.yml"
  push:
    branches:
      - master
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "Dockerfile.agrr-server"
      - "docs/migration/app-rust-stack/**"

concurrency:
  group: rust-domain-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-domain-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test agrr-domain
        run: cargo test -p agrr-domain

      - name: cargo test agrr-adapters-sqlite gateway parity
        run: cargo test -p agrr-adapters-sqlite -- '_gateway_test'

      - name: llvm-cov report (informational, no gate)
        continue-on-error: true
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked --quiet
          ./scripts/rust-domain-coverage.sh
