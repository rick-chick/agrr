# Playwright smoke E2E (route-smoke) on PR — agrr-server + strangler + ng serve
name: Frontend E2E smoke

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-e2e-smoke.yml'
      - 'scripts/run-e2e-smoke-ci.sh'
      - 'scripts/verify-e2e-smoke-ci-workflow-lib.mjs'
      - 'docker-compose.yml'
      - 'docker-compose.e2e-ci.yml'
      - 'Dockerfile.agrr-server'
      - 'docker/**'
      - 'crates/agrr-migrate/**'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/frontend-e2e-smoke.yml'
      - 'scripts/run-e2e-smoke-ci.sh'

concurrency:
  group: frontend-e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: E2E smoke CI workflow contract
        run: node --test scripts/verify-e2e-smoke-ci-workflow.test.mjs

      - name: Cache E2E dev SQLite
        uses: actions/cache@v4
        with:
          path: .docker/e2e_dev_db_cache
          key: e2e-dev-db-${{ hashFiles('crates/agrr-migrate/migrations/**/*.sql', 'db/fixtures/**') }}
          restore-keys: |
            e2e-dev-db-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Run route-smoke E2E
        env:
          E2E_CI_HEALTH_WAIT_SECS: "240"
        run: bash scripts/run-e2e-smoke-ci.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-route-smoke
          path: frontend/playwright-report/
          if-no-files-found: ignore
