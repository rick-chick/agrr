# Playwright route-smoke against docker compose dev stack (agrr-server + strangler :3000).
name: Frontend E2E smoke

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'crates/**'
      - 'docker/**'
      - 'Dockerfile.agrr-server'
      - 'docker-compose.yml'
      - '.cursor/skills/dev-docker/**'
      - '.github/workflows/frontend-e2e-smoke.yml'
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'crates/**'
      - 'docker/**'
      - 'Dockerfile.agrr-server'
      - 'docker-compose.yml'
      - '.cursor/skills/dev-docker/**'
      - '.github/workflows/frontend-e2e-smoke.yml'

concurrency:
  group: frontend-e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  route-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_CAPTURE_DEV_SESSION: '1'
      E2E_STRANGLER: '1'
      E2E_API_ORIGIN: http://127.0.0.1:3000
      CI: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build agrr-server image
        working-directory: ${{ github.workspace }}
        run: docker compose build agrr-server

      - name: Load reference data
        working-directory: ${{ github.workspace }}
        run: .cursor/skills/dev-docker/scripts/load-reference-data.sh

      - name: Start dev stack
        working-directory: ${{ github.workspace }}
        run: docker compose up -d agrr-server strangler-proxy

      - name: Wait for strangler proxy
        working-directory: ${{ github.workspace }}
        run: bash .cursor/skills/dev-docker/scripts/ci-wait-smoke-stack.sh http://127.0.0.1:3000

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Route smoke (route-manifest all routes)
        run: npx playwright test e2e/smoke/route-smoke.spec.ts

      - name: Stop dev stack
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose down
